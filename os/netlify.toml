# WSE Labs OS — deployed with base directory = "os"
[build]
  publish = "."
  command = ""

[functions]
  # dashboard.js serves Dashboard data from Supabase (service-role, server-side).
  # Requires env vars SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY.
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Edge function `auth` (os/netlify/edge-functions/auth.js) gates every path
# via HTTP Basic Auth using OS_USER / OS_PASSWORD env vars.
